<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>网购退货截图生成器</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Oxygen,Ubuntu,Cantarell,"Open Sans","Helvetica Neue",sans-serif}
        body{background-color:#f5f5f5;padding-bottom:80px}.container{max-width:450px;margin:0 auto;padding:15px}
        .header{text-align:center;padding:20px 0;font-size:20px;font-weight:bold;color:#333}
        .subtitle{text-align:center;font-size:13px;color:#999;margin-top:-10px;margin-bottom:15px;font-weight:normal}
        .form-group{margin-bottom:15px}.form-group label{display:block;margin-bottom:5px;font-size:14px;color:#666}
        .form-group textarea,.form-group input{width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;font-size:14px;resize:none}
        .form-group textarea{height:120px}.btn{width:100%;padding:14px;border:none;border-radius:8px;font-size:16px;font-weight:bold;cursor:pointer;transition:background-color .3s}
        .btn-primary{background-color:#2c83f2;color:#fff;margin-bottom:10px}.btn-primary:hover{background-color:#1a73e8}
        .btn-secondary{background-color:#f5f5f5;color:#666}.btn-secondary:hover{background-color:#e8e8e8}
        .templates{display:flex;flex-wrap:wrap;gap:10px;margin:15px 0;overflow-x:auto;padding-bottom:10px}
        .template-item{flex:0 0 auto;padding:8px 12px;text-align:center;cursor:pointer;border-radius:8px;font-size:14px;display:flex;align-items:center;gap:8px}
        .template-item.selected{background-color:#e8f0fe;border:1px solid #2c83f2;color:#2c83f2}
        .template-icon{width:22px;height:22px;object-fit:contain;image-rendering:-webkit-optimize-contrast}
        .canvas-container{width:100%;margin:20px 0;border-radius:12px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.1);background-color:#fff;position:relative}
        #imageCanvas{width:100%;display:block}.result-section{margin-top:20px;padding:15px;background-color:#fff;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.1)}
        .result-title{font-size:16px;font-weight:bold;margin-bottom:15px;color:#333}
        .loading,.modal{position:fixed;top:0;left:0;width:100%;height:100%;background-color:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:999;color:#fff;font-size:16px}
        .modal-content{width:80%;max-width:300px;background-color:#fff;border-radius:12px;padding:20px;text-align:center}
        .modal-title{font-size:18px;font-weight:bold;margin-bottom:10px;color:#333}.modal-desc{font-size:14px;color:#666;margin-bottom:20px;line-height:1.5}
        .modal-btns{display:flex;gap:10px}.modal-btn{flex:1;padding:10px;border-radius:8px;border:none;font-size:14px;font-weight:bold;cursor:pointer}
        .modal-btn-cancel{background-color:#f5f5f5;color:#666}.modal-btn-confirm{background-color:#2c83f2;color:#fff}.hidden{display:none}
        .action-row{display:flex;gap:10px;align-items:center;margin-top:10px}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">网购退货截图生成器</div>
        <div class="subtitle">闲鱼@你耳机听什么</div>
        <div class="templates" id="templatesContainer"></div>
        <div class="form-group">
            <label for="rawText">粘贴地址信息</label>
            <textarea id="rawText" placeholder="例如：张三 13800138000 北京市朝阳区建国路88号"></textarea>
        </div>
        <button class="btn btn-primary" id="pasteBtn">粘贴并解析</button>
        <button class="btn btn-secondary" id="clearBtn">清空内容</button>
        <div class="result-section hidden" id="resultSection">
            <div class="result-title">解析结果（可修改）</div>
            <div class="form-group"><label for="name">姓名</label><input type="text" id="name" placeholder="请输入姓名"></div>
            <div class="form-group"><label for="phone">手机号</label><input type="text" id="phone" placeholder="请输入手机号"></div>
            <div class="form-group"><label for="address">地址</label><textarea id="address" placeholder="请输入详细地址"></textarea></div>
            <div class="canvas-container"><canvas id="imageCanvas"></canvas></div>
            <div class="action-row"><button class="btn btn-primary" id="generateBtn" style="flex:1;">生成并保存图片</button></div>
        </div>
    </div>
    <div class="loading hidden" id="loadingModal">正在生成图片...</div>
    <div class="modal hidden" id="resultModal">
        <div class="modal-content">
            <div class="modal-title">生成成功！</div>
            <div class="modal-desc">图片已保存到浏览器下载文件夹</div>
            <div class="modal-btns"><button class="modal-btn modal-btn-confirm" id="modalCancelBtn">确定</button></div>
        </div>
    </div>
